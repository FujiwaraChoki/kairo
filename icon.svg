    <line x1="245" y1="170" x2="230" y2="200" stroke="#9a7a0a" stroke-opacity="0.15" stroke-width="0.5"/>
    <line x1="240" y1="200" x2="220" y2="230" stroke="#9a7a0a" stroke-opacity="0.18" stroke-width="0.5"/>
    <line x1="225" y1="200" x2="205" y2="230" stroke="#9a7a0a" stroke-opacity="0.15" stroke-width="0.5"/>
    <line x1="235" y1="230" x2="215" y2="260" stroke="#9a7a0a" stroke-opacity="0.18" stroke-width="0.5"/>
    <line x1="218" y1="230" x2="198" y2="260" stroke="#9a7a0a" stroke-opacity="0.15" stroke-width="0.5"/>
    <line x1="245" y1="260" x2="225" y2="290" stroke="#9a7a0a" stroke-opacity="0.16" stroke-width="0.5"/>
    <line x1="220" y1="260" x2="200" y2="290" stroke="#9a7a0a" stroke-opacity="0.15" stroke-width="0.5"/>
    <line x1="200" y1="260" x2="180" y2="290" stroke="#9a7a0a" stroke-opacity="0.13" stroke-width="0.5"/>
    <line x1="240" y1="290" x2="220" y2="320" stroke="#9a7a0a" stroke-opacity="0.14" stroke-width="0.5"/>
    <line x1="215" y1="290" x2="195" y2="320" stroke="#9a7a0a" stroke-opacity="0.13" stroke-width="0.5"/>
    <line x1="190" y1="290" x2="170" y2="320" stroke="#9a7a0a" stroke-opacity="0.12" stroke-width="0.5"/>
    <line x1="230" y1="340" x2="215" y2="360" stroke="#9a7a0a" stroke-opacity="0.12" stroke-width="0.5"/>
    <line x1="200" y1="340" x2="185" y2="360" stroke="#9a7a0a" stroke-opacity="0.11" stroke-width="0.5"/>
    <line x1="170" y1="340" x2="158" y2="360" stroke="#9a7a0a" stroke-opacity="0.1" stroke-width="0.5"/>

    <!-- Stone block lines — right face -->
    <!-- Horizontal courses -->
    <line x1="256" y1="170" x2="262" y2="170" stroke="#dab220" stroke-opacity="0.2" stroke-width="0.7"/>
    <line x1="256" y1="200" x2="280" y2="200" stroke="#dab220" stroke-opacity="0.25" stroke-width="0.7"/>
    <line x1="256" y1="230" x2="300" y2="230" stroke="#dab220" stroke-opacity="0.25" stroke-width="0.7"/>
    <line x1="256" y1="260" x2="320" y2="260" stroke="#dab220" stroke-opacity="0.25" stroke-width="0.7"/>
    <line x1="256" y1="290" x2="340" y2="290" stroke="#dab220" stroke-opacity="0.22" stroke-width="0.7"/>
    <line x1="256" y1="320" x2="360" y2="320" stroke="#dab220" stroke-opacity="0.2" stroke-width="0.7"/>
    <line x1="256" y1="340" x2="372" y2="340" stroke="#dab220" stroke-opacity="0.18" stroke-width="0.7"/>
    <line x1="256" y1="360" x2="382" y2="360" stroke="#dab220" stroke-opacity="0.16" stroke-width="0.7"/>
    <line x1="256" y1="378" x2="390" y2="378" stroke="#dab220" stroke-opacity="0.14" stroke-width="0.7"/>

    <!-- Vertical joints — right face -->
    <line x1="263" y1="170" x2="275" y2="200" stroke="#dab220" stroke-opacity="0.12" stroke-width="0.5"/>
    <line x1="270" y1="200" x2="285" y2="230" stroke="#dab220" stroke-opacity="0.14" stroke-width="0.5"/>
    <line x1="265" y1="230" x2="278" y2="260" stroke="#dab220" stroke-opacity="0.13" stroke-width="0.5"/>
    <line x1="282" y1="230" x2="300" y2="260" stroke="#dab220" stroke-opacity="0.12" stroke-width="0.5"/>
    <line x1="270" y1="260" x2="288" y2="290" stroke="#dab220" stroke-opacity="0.14" stroke-width="0.5"/>
    <line x1="295" y1="260" x2="315" y2="290" stroke="#dab220" stroke-opacity="0.12" stroke-width="0.5"/>
    <line x1="280" y1="290" x2="300" y2="320" stroke="#dab220" stroke-opacity="0.12" stroke-width="0.5"/>
    <line x1="310" y1="290" x2="330" y2="320" stroke="#dab220" stroke-opacity="0.11" stroke-width="0.5"/>
    <line x1="290" y1="320" x2="308" y2="340" stroke="#dab220" stroke-opacity="0.1" stroke-width="0.5"/>
    <line x1="325" y1="320" x2="345" y2="340" stroke="#dab220" stroke-opacity="0.1" stroke-width="0.5"/>
    <line x1="300" y1="340" x2="315" y2="360" stroke="#dab220" stroke-opacity="0.09" stroke-width="0.5"/>
    <line x1="340" y1="340" x2="358" y2="360" stroke="#dab220" stroke-opacity="0.09" stroke-width="0.5"/>

    <!-- Center ridge highlight -->
    <line x1="256" y1="140" x2="256" y2="395" stroke="#ffd54f" stroke-opacity="0.12" stroke-width="1.2"/>

    <!-- Subtle ambient occlusion at base -->
    <path d="M118 395 L394 395 L394 400 L118 400 Z" fill="#0a0812" opacity="0.3"/>


    <!-- Small secondary pyramid in background (distance) -->
    <path d="M420 395 L455 340 L490 395 Z" fill="#1e1840" opacity="0.5"/>
    <path d="M455 340 L455 395 L420 395 Z" fill="#18143a" opacity="0.5"/>
    <path d="M455 340 L455 395 L490 395 Z" fill="#241c48" opacity="0.5"/>

    <!-- Tiny distant pyramid -->
    <path d="M50 395 L72 368 L94 395 Z" fill="#1a1538" opacity="0.4"/>
    <path d="M72 368 L72 395 L50 395 Z" fill="#151230" opacity="0.4"/>
    <path d="M72 368 L72 395 L94 395 Z" fill="#1e183e" opacity="0.4"/>
  </g>
