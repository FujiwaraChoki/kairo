<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background gradient: deep night sky -->
    <linearGradient id="sky" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="40%" stop-color="#0d1125"/>
      <stop offset="70%" stop-color="#141a3a"/>
      <stop offset="100%" stop-color="#1a1f40"/>
    </linearGradient>

    <!-- Pyramid left face -->
    <linearGradient id="pyr-left" x1="110" y1="200" x2="256" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c49a1a"/>
      <stop offset="40%" stop-color="#a8820f"/>
      <stop offset="100%" stop-color="#8a6a08"/>
    </linearGradient>

    <!-- Pyramid right face -->
    <linearGradient id="pyr-right" x1="256" y1="160" x2="400" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0cf55"/>
      <stop offset="35%" stop-color="#e2b930"/>
      <stop offset="100%" stop-color="#c9a01c"/>
    </linearGradient>

    <!-- Desert sand -->
    <linearGradient id="sand" x1="256" y1="380" x2="256" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a2040"/>
      <stop offset="100%" stop-color="#1a1530"/>
    </linearGradient>

    <!-- Apex glow -->
    <radialGradient id="apex-glow" cx="256" cy="130" r="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffeea0" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#f0c847" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f0c847" stop-opacity="0"/>
    </radialGradient>

    <!-- Star shimmer -->
    <radialGradient id="star-bright" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#cde" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip for rounded square -->
    <clipPath id="clip">
      <rect width="512" height="512" rx="108"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Night sky background -->
    <rect width="512" height="512" fill="url(#sky)"/>

    <!-- Stars — scattered across the sky -->
    <!-- Bright stars -->
    <circle cx="80" cy="60" r="2.2" fill="#fff" opacity="0.9"/>
    <circle cx="80" cy="60" r="5" fill="#fff" opacity="0.12"/>
    <circle cx="430" cy="90" r="2" fill="#fff" opacity="0.85"/>
    <circle cx="430" cy="90" r="4.5" fill="#fff" opacity="0.1"/>
    <circle cx="150" cy="130" r="1.8" fill="#fff" opacity="0.8"/>
    <circle cx="370" cy="50" r="1.5" fill="#fff" opacity="0.75"/>
    <circle cx="370" cy="50" r="4" fill="#fff" opacity="0.08"/>
    <circle cx="60" cy="180" r="1.6" fill="#fff" opacity="0.7"/>
    <circle cx="460" cy="200" r="1.4" fill="#fff" opacity="0.65"/>
    <circle cx="320" cy="35" r="2.4" fill="#ffe8a0" opacity="0.9"/>
    <circle cx="320" cy="35" r="6" fill="#ffe8a0" opacity="0.1"/>

    <!-- Dim stars -->
    <circle cx="45" cy="110" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="120" cy="45" r="0.9" fill="#fff" opacity="0.35"/>
    <circle cx="200" cy="80" r="1.1" fill="#fff" opacity="0.45"/>
    <circle cx="290" cy="60" r="0.8" fill="#fff" opacity="0.3"/>
    <circle cx="410" cy="140" r="1" fill="#fff" opacity="0.35"/>
    <circle cx="470" cy="50" r="0.9" fill="#fff" opacity="0.4"/>
    <circle cx="35" cy="250" r="0.8" fill="#fff" opacity="0.3"/>
    <circle cx="480" cy="280" r="0.9" fill="#fff" opacity="0.25"/>
    <circle cx="100" cy="210" r="0.7" fill="#fff" opacity="0.3"/>
    <circle cx="440" cy="170" r="0.7" fill="#fff" opacity="0.28"/>
    <circle cx="170" cy="170" r="0.6" fill="#fff" opacity="0.25"/>
    <circle cx="350" cy="100" r="0.8" fill="#fff" opacity="0.32"/>
    <circle cx="230" cy="50" r="0.7" fill="#fff" opacity="0.28"/>
    <circle cx="490" cy="120" r="0.6" fill="#fff" opacity="0.22"/>
    <circle cx="25" cy="40" r="0.7" fill="#fff" opacity="0.3"/>
    <circle cx="500" cy="30" r="0.6" fill="#fff" opacity="0.25"/>

    <!-- Desert ground -->
    <path d="M0 395 Q80 385 160 392 Q256 400 340 390 Q420 383 512 395 L512 512 L0 512 Z" fill="url(#sand)"/>
    <!-- Sand dune highlights -->
    <path d="M0 398 Q80 388 160 395 Q256 403 340 393 Q420 386 512 398 L512 400 Q420 388 340 395 Q256 405 160 397 Q80 390 0 400 Z" fill="#3a2d55" opacity="0.3"/>

    <!-- Pyramid shadow on ground -->
    <path d="M130 395 L256 395 L400 395 L460 420 L80 420 Z" fill="#0a0812" opacity="0.4"/>

    <!-- PYRAMID: Left face (shadow side) -->
    <path d="M256 140 L118 395 L256 395 Z" fill="url(#pyr-left)"/>

    <!-- PYRAMID: Right face (lit side) -->
    <path d="M256 140 L394 395 L256 395 Z" fill="url(#pyr-right)"/>

    <!-- Stone block lines — left face -->
    <!-- Horizontal courses -->
    <line x1="250" y1="170" x2="256" y2="170" stroke="#9a7a0a" stroke-opacity="0.25" stroke-width="0.7"/>
    <line x1="232" y1="200" x2="256" y2="200" stroke="#9a7a0a" stroke-opacity="0.3" stroke-width="0.7"/>
    <line x1="212" y1="230" x2="256" y2="230" stroke="#9a7a0a" stroke-opacity="0.3" stroke-width="0.7"/>
    <line x1="192" y1="260" x2="256" y2="260" stroke="#9a7a0a" stroke-opacity="0.3" stroke-width="0.7"/>
    <line x1="172" y1="290" x2="256" y2="290" stroke="#9a7a0a" stroke-opacity="0.28" stroke-width="0.7"/>
    <line x1="152" y1="320" x2="256" y2="320" stroke="#9a7a0a" stroke-opacity="0.25" stroke-width="0.7"/>
    <line x1="138" y1="340" x2="256" y2="340" stroke="#9a7a0a" stroke-opacity="0.22" stroke-width="0.7"/>
    <line x1="128" y1="360" x2="256" y2="360" stroke="#9a7a0a" stroke-opacity="0.2" stroke-width="0.7"/>
    <line x1="122" y1="378" x2="256" y2="378" stroke="#9a7a0a" stroke-opacity="0.18" stroke-width="0.7"/>

